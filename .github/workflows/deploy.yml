name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Build the site and publish it to the gh-pages branch, which GitHub Pages
# serves. This uses a single job (avoids the separate deploy-pages job that
# sometimes can't acquire a hosted runner).
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: touch dist/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
